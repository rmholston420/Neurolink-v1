# Neurolink — development compose file
# Run with:  podman-compose -f compose.dev.yml up --build
# Or:        docker compose  -f compose.dev.yml up --build
#
# BLE notes (Podman rootless):
#   The backend needs access to the host BlueZ D-Bus socket.
#   On a systemd host the socket lives at /run/dbus/system_bus_socket.
#   Rootless Podman maps the container UID to the host UID (keep-id),
#   so the mounted socket is accessible without `privileged: true`.
#   If your distro uses a different socket path, override
#   DBUS_SYSTEM_BUS_ADDRESS in your local .env file.
#
#   Required host capabilities for raw HCI (Bluetooth):
#     sudo setcap 'cap_net_admin,cap_net_raw+eip' $(which python3)
#   Or run the compose service with `cap_add` below (already present).

services:
  redis:
    image: docker.io/library/redis:7-alpine
    ports:
      - "6380:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    environment:
      - NEUROLINK_ADAPTER_TYPE=mock
      - NEUROLINK_DB_PATH=/app/data/neurolink.db
      - NEUROLINK_REDIS_URL=redis://redis:6379/0
      - NEUROLINK_REDIS_ENABLED=false
      - NEUROLINK_LOG_JSON=true
      - NEUROLINK_CORS_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost:8003
      # Tell dbus-fast where the host system bus socket is
      - DBUS_SYSTEM_BUS_ADDRESS=unix:path=/run/dbus/system_bus_socket
    volumes:
      - neurolink_data:/app/data
      # Expose host D-Bus socket so bleak can reach BlueZ
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
    # Rootless Podman: map container UID to the current host user.
    # This ensures the mounted D-Bus socket is readable without
    # requiring `privileged: true`.
    userns_mode: keep-id
    # Raw Bluetooth HCI access (replaces `privileged: true`).
    # Docker / Podman with rootless still needs CAP_NET_RAW;
    # comment out `cap_add` and re-add `privileged: true` if you
    # prefer the old behaviour.
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8003
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - frontend

volumes:
  neurolink_data:
