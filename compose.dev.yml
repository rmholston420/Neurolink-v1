version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NEUROLINK_ADAPTER_TYPE=mock
      - NEUROLINK_DEVICE_MODEL=muse_s_gen1
      - NEUROLINK_REDIS_URL=redis://redis:6379/0
      - NEUROLINK_DB_PATH=/app/data/neurolink.db
      - NEUROLINK_LOG_JSON=false
    volumes:
      - neurolink-data:/app/data
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  neurolink-data:
