version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"  # host 6380 avoids conflict with any local Redis on 6379
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NEUROLINK_ADAPTER_TYPE=mock
      - NEUROLINK_DB_PATH=/app/data/neurolink.db
      - NEUROLINK_REDIS_URL=redis://redis:6379/0
      - NEUROLINK_REDIS_ENABLED=false
      - NEUROLINK_LOG_JSON=true
      - NEUROLINK_CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    volumes:
      - neurolink_data:/app/data
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - frontend

volumes:
  neurolink_data:
