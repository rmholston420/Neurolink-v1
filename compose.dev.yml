# Neurolink — development compose file
# Run with:  podman-compose -f compose.dev.yml up --build
# Or:        docker compose  -f compose.dev.yml up --build
#
# ── BLE / Bluetooth mode ──────────────────────────────────────────────────────
# When NEUROLINK_ADAPTER_TYPE=ble, uncomment the three lines marked [BLE] below
# and set NEUROLINK_MUSE_BLE_ADDRESS in your .env.
#
# [BLE] requires BlueZ on the host (Linux only). The D-Bus socket must be
# accessible to the container user. On rootless Podman this is handled by
# userns_mode + the socket volume mount below.
#
# Required host capability for raw HCI:
#   sudo setcap 'cap_net_admin,cap_net_raw+eip' $(which python3)

services:
  redis:
    image: docker.io/library/redis:7-alpine
    container_name: neurolink-redis
    ports:
      - "6380:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neurolink-backend
    ports:
      - "8003:8000"
    environment:
      - NEUROLINK_ADAPTER_TYPE=mock
      - NEUROLINK_DB_PATH=/app/data/neurolink.db
      - NEUROLINK_REDIS_URL=redis://neurolink-redis:6379/0
      - NEUROLINK_REDIS_ENABLED=false
      - NEUROLINK_LOG_JSON=true
      - NEUROLINK_CORS_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost:8003
      # [BLE] Uncomment for Bluetooth mode:
      # - DBUS_SYSTEM_BUS_ADDRESS=unix:path=/run/dbus/system_bus_socket
    volumes:
      - neurolink_data:/app/data
      # [BLE] Uncomment to expose host D-Bus socket for bleak/BlueZ:
      # - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
    # [BLE] Uncomment for rootless Podman BLE access (conflicts with
    # podman-compose pod mode if other services share the pod):
    # userns_mode: keep-id
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neurolink-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8003
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - frontend

volumes:
  neurolink_data:
