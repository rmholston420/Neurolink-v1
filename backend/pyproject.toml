[project]
name = "neurolink"
version = "1.0.0"
requires-python = ">=3.12"

dependencies = [
  "fastapi>=0.115,<0.116",
  "uvicorn[standard]>=0.30,<0.31",
  "pydantic>=2.7,<3",
  "pydantic-settings>=2.0,<3",
  "redis[hiredis]>=5.0",
  "aiosqlite>=0.20",
  "sqlalchemy[asyncio]>=2.0,<3",
  "bleak>=0.22,<0.23",
  "pylsl>=1.16",
  "numpy>=1.26,<2",
  "neurokit2>=0.2",
  "scipy>=1.13",
  "structlog>=24.0",
  "sse-starlette>=2.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "httpx>=0.27",
  "ruff>=0.4",
  "mypy>=1.10",
  "coverage[toml]>=7.0",
  "pytest-cov>=5.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends.legacy:build"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.run]
source = ["neurolink"]
omit = ["tests/*", "migrations/*"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501", "B008"]

[tool.mypy]
python_version = "3.12"
strict = false
warn_return_any = false
warn_unused_ignores = false
ignore_missing_imports = true
exclude = ["tests", "migrations"]
