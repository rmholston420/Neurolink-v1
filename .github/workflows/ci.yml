name: Neurolink CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        working-directory: backend
        env:
          NEUROLINK_ADAPTER_TYPE: mock
          NEUROLINK_DB_PATH: ":memory:"
          NEUROLINK_REDIS_URL: ""
          NEUROLINK_REDIS_ENABLED: "false"
        run: |
          pytest tests/unit/ -v --tb=short

      - name: Run all tests with coverage
        working-directory: backend
        env:
          NEUROLINK_ADAPTER_TYPE: mock
          NEUROLINK_DB_PATH: ":memory:"
          NEUROLINK_REDIS_URL: ""
          NEUROLINK_REDIS_ENABLED: "false"
        run: |
          pytest -v --tb=short --cov=neurolink --cov-report=term-missing --cov-fail-under=80

      - name: Lint with ruff
        working-directory: backend
        run: |
          ruff check . || true

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build
