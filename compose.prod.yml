version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NEUROLINK_ADAPTER_TYPE=${NEUROLINK_ADAPTER_TYPE:-mock}
      - NEUROLINK_DEVICE_MODEL=${NEUROLINK_DEVICE_MODEL:-muse_s_gen1}
      - NEUROLINK_MUSE_BLE_ADDRESS=${NEUROLINK_MUSE_BLE_ADDRESS:-}
      - NEUROLINK_DB_PATH=/app/data/neurolink.db
      - NEUROLINK_REDIS_URL=redis://redis:6379/0
      - NEUROLINK_REDIS_ENABLED=${NEUROLINK_REDIS_ENABLED:-false}
      - NEUROLINK_LOG_JSON=true
    volumes:
      - neurolink_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: always

volumes:
  neurolink_data:
