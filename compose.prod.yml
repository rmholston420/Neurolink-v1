# Neurolink — production compose file
# Run with:  podman-compose -f compose.prod.yml up --build -d
# Or:        docker compose  -f compose.prod.yml up --build -d
#
# The `version:` key is intentionally omitted — it is deprecated in
# Docker Compose v2 and not recognised by podman-compose >= 1.0.

services:
  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NEUROLINK_ADAPTER_TYPE=${NEUROLINK_ADAPTER_TYPE:-mock}
      - NEUROLINK_DEVICE_MODEL=${NEUROLINK_DEVICE_MODEL:-muse_s_gen1}
      - NEUROLINK_MUSE_BLE_ADDRESS=${NEUROLINK_MUSE_BLE_ADDRESS:-}
      - NEUROLINK_DB_PATH=/app/data/neurolink.db
      - NEUROLINK_REDIS_URL=redis://redis:6379/0
      - NEUROLINK_REDIS_ENABLED=${NEUROLINK_REDIS_ENABLED:-false}
      - NEUROLINK_LOG_JSON=true
    volumes:
      - neurolink_data:/app/data
    # Rootless Podman: keep host UID so volume files are owned correctly.
    userns_mode: keep-id
    depends_on:
      redis:
        condition: service_healthy
    restart: always

volumes:
  neurolink_data:
